global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    monitor: 'cms-monitoring'
    site: prod

remote_write:
  - url: http://victoria-metrics:8428/api/v1/write

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'vm'

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          instance: 'mysql'

  - job_name: 'php-fpm'
    static_configs:
      - targets: ['php-fpm-exporter:9253']
        labels:
          instance: 'wordpress-php'

  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:8404']
        labels:
          instance: 'haproxy'

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://haproxy:80'
          - 'http://haproxy:80/wp-admin'
        labels:
          instance: 'wordpress-site'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - 'mysql:3306'
          - 'wordpress:9000'
          - 'haproxy:80'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        regex: '(.*):.*'
        target_label: instance
        replacement: '${1}'
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'
