global
    log stdout format raw local0
    maxconn 4096
    stats socket /tmp/haproxy.sock mode 660 level admin

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http-in
    bind *:80
    default_backend wordpress_servers

frontend prometheus-metrics
    bind *:8404
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    no log

backend wordpress_servers
    option httpchk GET /wp-includes/images/blank.gif
    server wordpress1 wordpress:80 check inter 5s rise 2 fall 3
